<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Conversion Audit Report</title>

<style>

body {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial;
  background: linear-gradient(180deg,#f8fafc 0%, #eef2ff 100%);
  color: #0f172a;
  margin: 0;
  padding: 14px;
}

.container {
  max-width: 720px;
  margin: auto;
}

.hero {
  background:white;
  padding:18px;
  border-radius:18px;
  box-shadow:0 20px 60px rgba(15,23,42,0.08);
}

h1 {
  font-size:20px;
  margin-bottom:6px;
}

.title-main {
  font-weight:800;
  display:block;
}

.title-domain {
  display:block;
  font-size:14px;
  color:#64748b;
}

.score {
  font-size:52px;
  font-weight:900;
  color:#16a34a;
}

.bad {
  color:#dc2626;
  font-size:14px;
}

.meta {
  margin-top:10px;
  font-size:13px;
  color:#64748b;
}

.alert {
  margin-top:16px;
  padding:14px;
  background:#fef2f2;
  border:1px solid #fecaca;
  border-radius:14px;
  font-weight:600;
}

.money {
  margin-top:16px;
  padding:18px;
  border-radius:16px;
  background:#fff1f2;
  border:1px solid #fecaca;
  text-align:center;
}

.money strong {
  font-size:28px;
  color:#dc2626;
}

.daily {
  margin-top:10px;
  font-size:14px;
  font-weight:600;
  color:#dc2626;
}

.card {
  padding:16px;
  border-radius:16px;
  margin-top:16px;
  background:white;
  border:1px solid #e2e8f0;
}

.card-problem { background:#fff1f2; }
.card-fix { background:#f0fdf4; }

.section-title {
  font-size:12px;
  text-transform:uppercase;
  color:#64748b;
}

.compare-box { padding:12px; margin-top:8px; border-radius:12px; }
.before { background:#fff1f2; }
.after { background:#f0fdf4; }

.leak-item, .plan-item {
  margin-top:10px;
  padding:12px;
  border-radius:12px;
}

.leak-item { background:#fff1f2; }
.plan-item { background:#f0fdf4; }

.cta-box {
  margin-top:28px;
  padding:18px;
  background:white;
  border-radius:18px;
  text-align:center;
}

.cta {
  display:block;
  margin-top:12px;
  padding:16px;
  background:#059669;
  color:white;
  border-radius:14px;
  font-weight:800;
  text-decoration:none;
}

.download {
  margin-top:10px;
  width:100%;
  padding:14px;
  background:#0f172a;
  color:white;
  border:none;
  border-radius:12px;
}

.small {
  font-size:12px;
  color:#94a3b8;
  margin-top:10px;
  text-align:center;
}

.benefits {
  margin-top:12px;
  font-size:13px;
  text-align:left;
}

.print-cover, .print-footer { display:none; }

@media print {
  @page { size:A4; margin:20mm; }

  .cta-box, .download { display:none !important; }

  .print-cover { display:block; margin-bottom:30px; }

  body::after {
    content:"ATOM FOUNDRY";
    position:fixed;
    opacity:0.03;
    font-size:120px;
    transform:rotate(-30deg);
    top:40%;
    left:10%;
  }
}

</style>
</head>

<body>

<div class="container">

<div class="print-cover">
  <div>ATOM FOUNDRY</div>
  <div id="print-domain"></div>
</div>

<div class="hero">

<h1>
  <span class="title-main">Conversion Audit Report</span>
  <span class="title-domain" id="title-domain"></span>
</h1>

<div class="score" id="score"></div>
<div class="bad">Needs Improvement</div>

<div class="meta">
Estimated Revenue Loss: <strong>10–30%</strong>
</div>

</div>

<div class="alert">
⚠️ This store is losing revenue
</div>

<div class="money">
  <strong>$2,000 – $8,000</strong>
  <div class="daily" id="daily"></div>
</div>

<div class="card card-problem">
  <p id="main"></p>
</div>

<div class="card card-fix">
  <p id="fix"></p>
</div>

<div class="card">
  <div class="compare-box before"><span id="before"></span></div>
  <div class="compare-box after"><span id="after"></span></div>
</div>

<div class="card"><div id="leaks"></div></div>
<div class="card card-fix"><div id="plan"></div></div>

<div class="cta-box">
  <a class="cta">Start Monitoring $89/month</a>
</div>

</div>

<script>

(async function(){

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

const res = await fetch(
`https://n8n-production-0a8f.up.railway.app/webhook/get-audit?token=${token}`
);

const data = await res.json();
const report = data.report_json || data;

document.getElementById("title-domain").innerText = data.store_domain;
document.getElementById("score").innerText = `${data.score}/100`;

document.getElementById("main").innerText = report.main_leak;
document.getElementById("fix").innerText = report.quick_fix;

document.getElementById("before").innerText = report.before_after?.before || "";
document.getElementById("after").innerText = report.before_after?.after || "";

document.getElementById("daily").innerText =
"Estimated daily loss (approx.)";

(report.leaks || []).forEach(l => {
  const div = document.createElement("div");
  div.className = "leak-item";
  div.innerHTML = `<strong>${l.title}</strong><br>${l.impact}`;
  document.getElementById("leaks").appendChild(div);
});

(report.revenue_plan || []).forEach(p => {
  const div = document.createElement("div");
  div.className = "plan-item";
  div.innerHTML = `<strong>${p.fix}</strong>`;
  document.getElementById("plan").appendChild(div);
});

})();

</script>

</body>
</html>
