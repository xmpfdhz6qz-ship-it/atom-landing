<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audit Report</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
  background:#f8fafc;
  color:#0f172a;
  margin:0;
  padding:20px;
}

.container{
  max-width:720px;
  margin:auto;
}

.card{
  background:white;
  padding:20px;
  border-radius:16px;
  margin-top:16px;
  border:1px solid #e2e8f0;
}

.cta{
  display:block;
  margin-top:24px;
  padding:18px;
  text-align:center;
  background:linear-gradient(135deg,#22c55e,#16a34a);
  color:white;
  border-radius:12px;
  font-weight:700;
  text-decoration:none;
}
</style>

</head>

<body>

<div class="container">

<h1 id="title">Loading audit...</h1>

<div class="card">
  <h3>Top Issue</h3>
  <p id="main"></p>
</div>

<div class="card">
  <h3>Recommended Fix</h3>
  <p id="fix"></p>
</div>

<div class="card">
  <h3>All Issues</h3>
  <ul id="leaks"></ul>
</div>

<div class="card">
  <h3>Improvement Plan</h3>
  <ul id="plan"></ul>
</div>

<a class="cta" href="#">
Start Monitoring — $89/month
</a>

</div>

<script>

(async function(){

const token = window.location.pathname.split("/").pop();

const res = await fetch(`https://n8n-production-0a8f.up.railway.app/webhook/get-audit?token=${token}`);
const data = await res.json();

document.getElementById("title").innerText = data.store_domain + " Audit";

document.getElementById("main").innerText = data.report_json.main_leak;
document.getElementById("fix").innerText = data.report_json.quick_fix;

const leaks = data.report_json.leaks || [];
const plan = data.report_json.revenue_plan || [];

leaks.forEach(l => {
  const li = document.createElement("li");
  li.innerText = l.title + " → " + l.fix;
  document.getElementById("leaks").appendChild(li);
});

plan.forEach(p => {
  const li = document.createElement("li");
  li.innerText = p.fix + " (" + p.expected_impact + ")";
  document.getElementById("plan").appendChild(li);
});

})();

</script>

</body>
</html>
