<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Full Conversion Audit</title>

<style>

body {
  font-family: -apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial;
  background: #f8fafc;
  color: #0f172a;
  margin: 0;
  padding: 24px 16px;
}

.container {
  max-width: 720px;
  margin: auto;
}

h1 {
  font-size: 28px;
  margin-bottom: 6px;
}

.score {
  font-size: 56px;
  font-weight: 800;
  color: #16a34a;
  margin-top: 10px;
}

.meta {
  margin-top:6px;
  font-size:13px;
  color:#64748b;
}

.card {
  padding:22px;
  border-radius:18px;
  margin-top:18px;
  border:1px solid #e2e8f0;
  box-shadow:0 10px 30px rgba(15,23,42,0.05);
}

.card-red { background:#fef2f2; border:1px solid #fecaca; }
.card-green { background:#ecfdf5; border:1px solid #bbf7d0; }
.card-neutral { background:#ffffff; }

.section-title {
  font-weight:600;
  font-size:13px;
  color:#64748b;
  text-transform:uppercase;
  margin-bottom:8px;
}

.leak {
  margin-top:14px;
}

.priority {
  font-size:12px;
  font-weight:600;
  color:#dc2626;
}

.cta {
  display:block;
  margin-top:24px;
  padding:20px;
  text-align:center;
  background:linear-gradient(135deg,#7c3aed,#6d28d9);
  color:white;
  border-radius:14px;
  font-weight:700;
  font-size:18px;
  text-decoration:none;
  box-shadow:0 12px 30px rgba(124,58,237,0.35);
}

</style>
</head>

<body>

<div class="container">

<h1 id="title">Loading audit...</h1>
<div class="score" id="score"></div>

<div class="meta">
Full AI Conversion Audit Report
</div>

<div class="card card-red">
  <div class="section-title">Main Conversion Leak</div>
  <p id="main"></p>
</div>

<div class="card card-green">
  <div class="section-title">Quick Win Fix</div>
  <p id="fix"></p>
</div>

<div class="card card-neutral">
  <div class="section-title">All Detected Issues</div>
  <div id="leaks"></div>
</div>

<div class="card card-neutral">
  <div class="section-title">Revenue Growth Plan</div>
  <div id="plan"></div>
</div>

<a class="cta" href="#">
Start Continuous Conversion Monitoring — $89/month
</a>

</div>

<script>
(async function(){

const params = new URLSearchParams(window.location.search);
const token = params.get("token");

const titleEl = document.getElementById("title");
const scoreEl = document.getElementById("score");
const mainEl = document.getElementById("main");
const fixEl = document.getElementById("fix");
const leaksEl = document.getElementById("leaks");
const planEl = document.getElementById("plan");

try {

const res = await fetch(
`https://n8n-production-0a8f.up.railway.app/webhook/get-audit?token=${token}`
);

const data = await res.json();

const report = data.report_json || data;

titleEl.innerText = data.store_domain || "Store Audit";
scoreEl.innerText = `${data.score || 62}/100`;

mainEl.innerText = report.main_leak;
fixEl.innerText = report.quick_fix;

// leaks
(report.leaks || []).forEach(l => {
  const div = document.createElement("div");
  div.className = "leak";
  div.innerHTML = `
    <strong>${l.title}</strong><br>
    <span class="priority">${l.priority}</span><br>
    ${l.impact}<br>
    <em>${l.fix}</em>
  `;
  leaksEl.appendChild(div);
});

// plan
(report.revenue_plan || []).forEach(p => {
  const div = document.createElement("div");
  div.className = "leak";
  div.innerHTML = `
    <strong>${p.priority}</strong><br>
    ${p.fix}<br>
    <em>${p.expected_impact}</em>
  `;
  planEl.appendChild(div);
});

} catch(e){
  titleEl.innerText = "Error loading audit";
}

})();
</script>

</body>
</html>
