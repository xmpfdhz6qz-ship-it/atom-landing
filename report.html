<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Store Report – Atom Foundry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
      background:#0f172a;
      color:white;
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
    }

    .container {
      max-width:640px;
      width:100%;
      padding:20px;
      text-align:center;
    }

    h1 {
      font-size:28px;
      margin-bottom:10px;
    }

    .card {
      background:#1e293b;
      padding:20px;
      border-radius:16px;
      margin-top:16px;
      border:1px solid #334155;
      text-align:left;
    }

    .red {
      border-color:#ef4444;
    }

    .green {
      border-color:#22c55e;
    }

    .score {
      font-size:42px;
      font-weight:900;
      text-align:center;
      margin-top:10px;
    }

    .money {
      font-size:32px;
      font-weight:800;
      color:#ef4444;
      text-align:center;
      margin-top:8px;
    }

    .cta {
      display:block;
      margin-top:24px;
      padding:18px;
      border-radius:14px;
      background:linear-gradient(135deg,#ff7a18,#ff5a00);
      color:white;
      text-decoration:none;
      font-weight:800;
      text-align:center;
      font-size:16px;
      box-shadow:0 12px 35px rgba(255,90,0,0.35);
    }

    .subtle {
      font-size:13px;
      color:#94a3b8;
      margin-top:8px;
      text-align:center;
    }
  </style>
</head>

<body>

<div class="container">
  <div id="app">Analyzing conversion leaks...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const domain = params.get("domain");

const app = document.getElementById("app");

function formatMoney(num) {
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

if (!app) {
  console.error("Missing #app element");
} else if (!domain) {
  app.innerText = "Missing domain";
} else {

  setTimeout(() => {

    fetch(`https://n8n-production-0a8f.up.railway.app/webhook/get-report?domain=${domain}`)
      .then(res => res.json())
      .then(data => {

        if (!data || !data.score) {
          app.innerText = "No data found";
          return;
        }

        const estimatedLossRaw = Math.round((100 - data.score) * 40);
        const estimatedLoss = formatMoney(estimatedLossRaw);

        app.innerHTML = `
          <h1>This store is losing revenue</h1>

          <div class="card">
            <div style="text-align:center;">Conversion Score</div>
            <div class="score">${data.score}/100</div>
          </div>

          <div class="card red">
            <div style="text-align:center;">Estimated revenue loss</div>
            <div class="money">$${estimatedLoss}+ / month</div>
          </div>

          <div class="card red">
            <strong>This is happening right now:</strong><br><br>
            Visitors land on your store → don’t see a clear next step → hesitate → leave.<br><br>
            You are paying for traffic that never converts.
          </div>

          <div class="card red">
            <strong>Main conversion leak:</strong><br><br>
            ${data.main_leak || "Users are confused and leave without taking action."}
          </div>

          <div class="card green">
            <strong>Quick win (you can test today):</strong><br><br>
            ${data.quick_fix || "Add a clear CTA above the fold."}
          </div>

          <div class="card">
            <strong>What you’ll get in full audit:</strong><br><br>
            • Exact points where users drop off (critical leaks)<br>
            • Priority fix roadmap (what to fix first)<br>
            • Rewritten CTAs & messaging (conversion-focused)<br>
            • Immediate action steps you can implement today
          </div>

          <a href="/audit" class="cta">
            Fix My Revenue Leaks → $399
          </a>

          <div class="subtle">
            17 stores analyzed today. Most had similar issues.
          </div>
        `;
      })
      .catch((err) => {
        console.error(err);
        app.innerText = "Error loading report";
      });

  }, 800);
}
</script>

</body>
</html>
