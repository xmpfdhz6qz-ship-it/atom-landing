<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Store Report – Atom Foundry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
      background:#0f172a;
      color:white;
    }

    .container {
      max-width:640px;
      width:100%;
      margin:0 auto;
      padding:40px 16px;
      text-align:center;
    }

    h1 {
      font-size:24px;
      margin-bottom:10px;
    }

    .card {
      background:#1e293b;
      padding:16px;
      border-radius:14px;
      margin-top:14px;
      border:1px solid #334155;
      text-align:left;
    }

    .red {
      border-color:#ef4444;
      background:#2a1a1a;
    }

    .green {
      border-color:#22c55e;
      background:#162a1f;
    }

    .highlight {
      text-align:center;
    }

    .score {
      font-size:36px;
      font-weight:900;
      margin-top:6px;
    }

    .money {
      font-size:28px;
      font-weight:900;
      color:#ef4444;
      margin-top:6px;
    }

    .cta {
      display:block;
      margin-top:22px;
      padding:18px;
      border-radius:14px;
      background:linear-gradient(135deg,#ff7a18,#ff5a00);
      color:white;
      text-decoration:none;
      font-weight:900;
      text-align:center;
      font-size:16px;
      border:1px solid #ff3b30;
      box-shadow:0 14px 40px rgba(255,90,0,0.35);
    }

    .subtle {
      font-size:12px;
      color:#94a3b8;
      margin-top:10px;
      text-align:center;
    }

    .small {
      font-size:13px;
      color:#cbd5f5;
    }

    .warning {
      color:#f87171;
      font-size:13px;
      margin-top:6px;
    }

    @media (max-width:600px) {
      h1 {
        font-size:22px;
      }
    }
  </style>
</head>

<body>

<div class="container">
  <div id="app">Analyzing conversion leaks...</div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const domain = params.get("domain");

const app = document.getElementById("app");

function formatMoney(num) {
  return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

if (!app) {
  console.error("Missing #app element");
} else if (!domain) {
  app.innerText = "Missing domain";
} else {

  setTimeout(() => {

    fetch(`https://n8n-production-0a8f.up.railway.app/webhook/get-report?domain=${domain}`)
      .then(res => res.json())
      .then(data => {

        if (!data || !data.score) {
          app.innerText = "No data found";
          return;
        }

        const estimatedLossRaw = Math.round((100 - data.score) * 40);
        const estimatedLoss = formatMoney(estimatedLossRaw);

        app.innerHTML = `
          <h1>Free scan limit reached</h1>
          <div class="subtle">You can scan this store again in 30 days</div>

          <div class="card red highlight">
            <div class="small">Estimated revenue loss</div>
            <div class="money">$${estimatedLoss}+ / month</div>
            <div class="warning">This is happening right now</div>
          </div>

          <div class="card highlight">
            <div class="small">Conversion Score</div>
            <div class="score">${data.score}/100</div>
            <div class="warning">Below high-performing stores (85+)</div>
          </div>

          <div class="card">
            <strong>What’s happening:</strong><br><br>
            Visitors land → don’t see what to do → hesitate → leave.<br><br>
            You are paying for traffic that never converts.
          </div>

          <div class="card red">
            <strong>Main conversion leak:</strong><br><br>
            ${data.main_leak || "Users are confused and leave without taking action."}
          </div>

          <div class="card green">
            <strong>Quick win (you can test today):</strong><br><br>
            ${data.quick_fix || "Add a clear CTA above the fold."}
            <br><br>
            <span class="small">This alone can improve conversions</span>
          </div>

          <div class="card">
            <strong>More issues detected:</strong><br><br>
            → Conversion blockers across your funnel<br>
            → Trust & UX gaps reducing sales<br>
            → Missed revenue opportunities<br><br>
            <span class="warning">Full analysis not shown here</span>
          </div>

          <a href="/audit" class="cta">
            Unlock Full Conversion Audit → $399
          </a>

          <div class="subtle">
            Full breakdown of all revenue leaks + exact fixes
          </div>

          <div class="subtle" style="margin-top:12px;">
            17 stores analyzed today. Most had similar issues.
          </div>
        `;
      })
      .catch((err) => {
        console.error(err);
        app.innerText = "Error loading report";
      });

  }, 800);
}
</script>

</body>
</html>
