<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Store Report – Atom Foundry</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
      background:#0f172a;
      color:white;
      padding:40px 20px;
    }

    .container {
      max-width:700px;
      margin:auto;
    }

    .card {
      background:#1e293b;
      padding:24px;
      border-radius:16px;
      margin-bottom:16px;
    }

    .red {
      background:#7f1d1d;
    }

    .green {
      background:#14532d;
    }

    h1 {
      font-size:26px;
      margin-bottom:10px;
    }

    .score {
      font-size:40px;
      font-weight:900;
      margin:10px 0;
    }

    .cta {
      display:block;
      text-align:center;
      padding:18px;
      background:linear-gradient(135deg,#f97316,#ea580c);
      border-radius:12px;
      margin-top:20px;
      text-decoration:none;
      color:white;
      font-weight:800;
    }
  </style>
</head>

<body>

<div class="container" id="app">
  Loading...
</div>

<script>
const params = new URLSearchParams(window.location.search);
const domain = params.get("domain");

fetch(`https://n8n-production-0a8f.up.railway.app/webhook/get-report?domain=${domain}`)
  .then(res => res.json())
  .then(data => {

    document.getElementById("app").innerHTML = `
      <h1>${domain}</h1>

      <div class="card">
        <div>Conversion Score</div>
        <div class="score">${data.score}/100</div>
      </div>

      <div class="card red">
        <strong>Main Leak:</strong><br>
        ${data.main_leak}
      </div>

      <div class="card green">
        <strong>Quick Fix:</strong><br>
        ${data.quick_fix}
      </div>

      <a href="/audit" class="cta">
        Get Full Audit → $399
      </a>
    `;
  })
  .catch(() => {
    document.getElementById("app").innerText = "Error loading report";
  });
</script>

</body>
</html>
