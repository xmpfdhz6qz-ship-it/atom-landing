<script>
const params = new URLSearchParams(window.location.search);
const domain = params.get("domain");

if (!domain) {
  document.getElementById("app").innerText = "Missing domain";
} else {

  fetch(`https://n8n-production-0a8f.up.railway.app/webhook/get-report?domain=${domain}`)
    .then(res => res.json())
    .then(data => {

      document.getElementById("app").innerHTML = `
        <h1>${domain}</h1>

        <div class="card">
          <div>Conversion Score</div>
          <div class="score">${data.score}/100</div>
        </div>

        <div class="card red">
          <strong>Main Leak:</strong><br>
          ${data.main_leak}
        </div>

        <div class="card green">
          <strong>Quick Fix:</strong><br>
          ${data.quick_fix}
        </div>

        <a href="/audit" class="cta">
          Get Full Audit → $399
        </a>
      `;
    })
    .catch((err) => {
      console.error(err);
      document.getElementById("app").innerText = "Error loading report";
    });

}
</script>
