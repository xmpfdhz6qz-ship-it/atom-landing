<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atom Foundry – Find Revenue Leaks</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Your store is leaking revenue. Discover hidden conversion issues and fix them.">

  <style>
    body {
      margin:0;
      font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
      background:#0f172a;
      color:white;

      display:flex;
      justify-content:center;
      align-items:center;

      height:100vh;
    }

    .container {
      max-width:420px;
      width:100%;
      text-align:center;
      padding:20px;
    }

    h1 {
      font-size:30px;
      line-height:1.3;
      margin-bottom:12px;
    }

    .sub {
      color:#94a3b8;
      font-size:15px;
      margin-bottom:24px;
    }

    .box {
      background:#1e293b;
      padding:26px;
      border-radius:18px;
      border:1px solid #334155;
      box-shadow:0 20px 60px rgba(0,0,0,0.3);
    }

    input {
      width:100%;
      padding:14px;
      margin-top:12px;
      border-radius:10px;
      border:1px solid #334155;
      background:#0f172a;
      color:white;
      font-size:15px;
    }

    input::placeholder {
      color:#64748b;
    }

    .checkbox {
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:14px;
      font-size:13px;
      color:#94a3b8;
      text-align:left;
    }

    .checkbox input {
      width:auto;
      margin:0;
    }

    button {
      margin-top:18px;
      width:100%;
      padding:16px;
      border-radius:12px;
      border:2px solid #ff3b30;
      background:#ff6a00;
      color:white;
      font-weight:700;
      font-size:16px;
      cursor:pointer;
    }

    button:hover {
      opacity:0.92;
    }

    a {
      color:#60a5fa;
      text-decoration:none;
    }

    #status {
      margin-top:12px;
      font-size:13px;
      color:#94a3b8;
    }

    .proof {
      margin-top:28px;
      font-size:13px;
      color:#64748b;
    }

    @media (max-height:700px) {
      body {
        align-items:flex-start;
        padding-top:40px;
      }
    }

  </style>
</head>

<body>

<div class="container">

  <h1>
    You don’t have a traffic problem.<br>
    You have a revenue leak.
  </h1>

  <p class="sub">
    We scan your store and show exactly where you're losing money — and how to fix it.
  </p>

  <div class="box">

    <form id="scanForm">

      <input type="text" id="url" placeholder="yourstore.com" required />
      <input type="email" id="email" placeholder="your@email.com" required />

      <div class="checkbox">
        <input type="checkbox" required />
        <span>
          I agree to the 
          <a href="/terms-of-service">Terms</a> and 
          <a href="/privacy-policy">Privacy Policy</a>
        </span>
      </div>

      <button type="submit">
        Get My Free Store Score
      </button>

    </form>

    <p id="status"></p>

  </div>

  <div class="proof">
    Most stores lose 20–40% of revenue due to hidden conversion leaks.
  </div>

</div>

<script>
document.getElementById("scanForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  let url = document.getElementById("url").value.trim();
  const email = document.getElementById("email").value.trim();

  if (!url.startsWith("http")) {
    url = "https://" + url;
  }

  document.getElementById("status").innerText = "Scanning your store...";

  try {
    await fetch("https://n8n-production-0a8f.up.railway.app/webhook/store-score", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ url, email })
    });

    window.location.href = "/success";

  } catch (err) {
    document.getElementById("status").innerText = "Something went wrong.";
  }
});
</script>

</body>
</html>
