<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Store Analysis</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:sans-serif; padding:40px;">

<h1 id="title">Loading...</h1>

<p id="main"></p>
<p id="fix"></p>

<a href="https://buy.stripe.com/test_8x2bJ1ceBaYK6qd94yfUQ03">
  Get Full Audit ($399)
</a>

<script>
(async function () {

  // 👉 vezme domain z URL (např. ?domain=levne-gastro.cz)
  const params = new URLSearchParams(window.location.search);
  const domain = params.get("domain");

  // 👉 fallback když někdo přijde bez parametru
  if (!domain) {
    document.getElementById("title").innerText = "Missing domain";
    return;
  }

  try {
    const res = await fetch(
      `https://n8n-production-0a8f.up.railway.app/webhook/store-get?domain=${domain}`
    );

    const data = await res.json();

    console.log("DATA:", data); // debug

    // 👉 fallback pokud nic nevrátí
    if (!data || Object.keys(data).length === 0) {
      document.getElementById("title").innerText =
        `${domain} (no data yet)`;
      return;
    }

    // 👉 render
    document.getElementById("title").innerText =
      `${data.normalized_store || domain} Score: ${data.score || "N/A"}`;

    document.getElementById("main").innerText =
      "Main issue: " + (data.main_leak || "Not detected");

    document.getElementById("fix").innerText =
      "Quick fix: " + (data.quick_fix || "Not available");

  } catch (err) {
    console.error(err);
    document.getElementById("title").innerText = "Error loading data";
  }

})();
</script>

</body>
</html>
